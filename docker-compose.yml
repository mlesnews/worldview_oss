services:
  cassandra:
    image: cassandra:4.1.7
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    environment:
      - MAX_HEAP_SIZE=${CASSANDRA_MAX_HEAP:-1G}
      - HEAP_NEWSIZE=${CASSANDRA_HEAP_NEW:-200M}
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  janusgraph:
    image: janusgraph/janusgraph:1.0.0
    ports:
      - "${GREMLIN_PORT:-8182}:8182"
    environment:
      - JANUS_PROPS_TEMPLATE=cql
      - janusgraph.storage.hostname=cassandra
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bin/gremlin.sh", "-e", "scripts/remote-connect.groovy"]
      interval: 30s
      timeout: 10s
      retries: 10

  voice-server:
    build: ./voice-server
    ports:
      - "${VOICE_PORT:-8790}:8790"
    volumes:
      - voice-models:/models
    environment:
      - VOICE_MODEL=${VOICE_MODEL:-Qwen/Qwen2.5-Omni-3B}
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8790/v1/voice/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  cassandra-data:
  voice-models:
