services:
  cassandra:
    image: cassandra:4.1.7
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    environment:
      - MAX_HEAP_SIZE=${CASSANDRA_MAX_HEAP:-1G}
      - HEAP_NEWSIZE=${CASSANDRA_HEAP_NEW:-200M}
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5

  janusgraph:
    image: janusgraph/janusgraph:1.0.0
    ports:
      - "${GREMLIN_PORT:-8182}:8182"
    environment:
      - JANUS_PROPS_TEMPLATE=cassandra
      - janusgraph.storage.hostname=cassandra
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bin/gremlin.sh", "-e", "scripts/remote-connect.groovy"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  cassandra-data:
